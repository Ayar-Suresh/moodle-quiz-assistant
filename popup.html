<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizSnipe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07111d;
      --surface: #0d1b2e;
      --surface2: #122030;
      --border: #1a3a5c;
      --border2: #0f2540;
      --cyan: #00c8ff;
      --cyan-dim: rgba(0,200,255,0.12);
      --green: #00ff88;
      --green-dim: rgba(0,255,136,0.1);
      --red: #ff5050;
      --text: #c8d8e8;
      --text-dim: #5a7a9a;
      --text-muted: #3a5a7a;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      overflow: hidden;
    }

    /* ─── Header ────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #0d1b2e 0%, #091422 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(0,200,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bolt {
      font-size: 22px;
      filter: drop-shadow(0 0 8px #00c8ff);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 8px #00c8ff); }
      50% { filter: drop-shadow(0 0 16px #00c8ff) drop-shadow(0 0 28px #00a8ff); }
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.04em;
      text-shadow: 0 0 12px rgba(0,200,255,0.5);
      line-height: 1;
    }

    .logo-sub {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      box-shadow: 0 0 6px currentColor;
      transition: all 0.3s;
    }

    .status-dot.active {
      background: var(--green);
      animation: dot-pulse 1.5s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%,100% { box-shadow: 0 0 4px #00ff88; }
      50% { box-shadow: 0 0 12px #00ff88, 0 0 20px rgba(0,255,136,0.4); }
    }

    /* ─── Content ───────────────── */
    .content {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── API Key section ────────── */
    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .input-group {
      display: flex;
      gap: 6px;
    }

    .api-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .api-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(0,200,255,0.1);
    }

    .api-input::placeholder { color: var(--text-muted); }

    .save-btn {
      background: var(--cyan-dim);
      border: 1px solid rgba(0,200,255,0.25);
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .save-btn:hover {
      background: rgba(0,200,255,0.2);
      border-color: rgba(0,200,255,0.4);
    }

    .api-hint {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      line-height: 1.4;
    }

    .api-hint a {
      color: var(--cyan);
      text-decoration: none;
    }

    .api-hint a:hover { text-decoration: underline; }

    /* ─── Key status ─────────────── */
    .key-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 11px;
      transition: all 0.3s;
    }

    .key-status.has-key {
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,0.2);
      color: var(--green);
    }

    .key-status.no-key {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.2);
      color: var(--red);
    }

    .key-icon { font-size: 14px; }

    /* ─── Divider ─────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--border) 30%, var(--border) 70%, transparent 100%);
    }

    /* ─── Stats ───────────────────── */
    .stats-row {
      display: flex;
      gap: 8px;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
      transition: all 0.2s;
    }

    .stat-card:hover {
      border-color: var(--border);
      background: var(--surface2);
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--cyan);
      line-height: 1;
      text-shadow: 0 0 10px rgba(0,200,255,0.3);
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    /* ─── Action buttons ──────────── */
    .action-row {
      display: flex;
      gap: 8px;
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #0060cc 0%, #00a0ff 100%);
      border: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,120,255,0.3);
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,120,255,0.45);
    }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      border-color: #2a5a8a;
      color: var(--text);
    }

    /* ─── Shortcut hint ───────────── */
    .shortcut-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 10px;
    }

    .key-badge {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-dim);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* ─── Toast ───────────────────── */
    #toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      padding: 7px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { border-color: rgba(0,255,136,0.3); color: var(--green); }
    #toast.error { border-color: rgba(255,80,80,0.3); color: var(--red); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="bolt">⚡</span>
    <div class="logo-text">
      <span class="logo-title">QuizSnipe</span>
      <span class="logo-sub">AI Answer Highlighter</span>
    </div>
  </div>
  <div id="status-dot" class="status-dot"></div>
</div>

<div class="content">

  <!-- API Key -->
  <div>
    <div class="section-label">Groq API Key</div>
    <div id="key-status" class="key-status no-key">
      <span class="key-icon">🔑</span>
      <span id="key-status-text">No API key saved</span>
    </div>
    <div style="height:8px"></div>
    <div class="input-group">
      <input
        id="api-key-input"
        class="api-input"
        type="password"
        placeholder="gsk_••••••••••••••••••••••••"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="save-btn" id="save-btn">Save</button>
    </div>
    <div class="api-hint">
      Free API key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — blazing fast Llama 3.3 70B
    </div>
  </div>

  <div class="divider"></div>

  <!-- Stats -->
  <div>
    <div class="section-label">Current Page</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="q-count">—</div>
        <div class="stat-label">Questions</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="q-solved" style="color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.3)">—</div>
        <div class="stat-label">Solved</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="btn-primary" id="toggle-panel-btn">
      <span>🎯</span> Open Panel
    </button>
    <button class="btn-secondary" id="scan-btn">Scan ↺</button>
  </div>

  <!-- Keyboard shortcut hint -->
  <div class="shortcut-hint">
    <span>Toggle panel:</span>
    <span class="key-badge">Ctrl</span>
    <span style="color: #3a5a7a">+</span>
    <span class="key-badge">Shift</span>
    <span style="color: #3a5a7a">+</span>
    <span class="key-badge">Q</span>
  </div>

</div>

<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
